name: "publish"

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v' (e.g., v1.0.0)

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: read app version
        id: app_version
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action will replace __VERSION__ with the version from tauri.conf.json
          releaseName: "Riftle v__VERSION__"
          releaseBody: "See the assets below to download the latest version of Riftle."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      - name: create portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ steps.app_version.outputs.version }}"
          $portableDir = "portable/Riftle-$version-portable"
          $portableZip = "Riftle-$version-portable-windows-x64.zip"
          $releaseExe = "src-tauri/target/release/riftle.exe"

          if (!(Test-Path $releaseExe)) {
            throw "Expected release executable not found: $releaseExe"
          }

          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $releaseExe "$portableDir/riftle.exe"
          Copy-Item ".github/release/README_portable.txt" "$portableDir/README_portable.txt"
          New-Item -ItemType File -Force -Path "$portableDir/riftle-launcher.portable" | Out-Null

          Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force

      - name: upload portable zip to draft release
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.app_version.outputs.version }}"
          $portableZip = "Riftle-$version-portable-windows-x64.zip"
          gh release upload "v$version" $portableZip --clobber
